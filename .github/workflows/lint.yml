name: Linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    name: Run pre-commit checks
    steps:
        - uses: actions/checkout@v7.0.0
        - uses: pre-commit/action@v3.0.1
  ruff:
    runs-on: ubuntu-latest
    name: Run ruff check
    steps:
        - uses: actions/checkout@v7.0.0
        - uses: astral-sh/ruff-action@v4.1.0
